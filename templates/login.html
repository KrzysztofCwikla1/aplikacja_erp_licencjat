<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - System ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#eef1f5; height:100vh; display:flex; align-items:center; }
        .login-card { max-width:380px; margin:0 auto; border:none; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.08); }
        .login-logo { font-size:28px; color:#0d6efd; }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card p-4">
        <div class="text-center mb-3">
            <div class="login-logo"><i class="bi bi-building"></i></div>
            <h5 class="mt-2 mb-0">System ERP</h5>
            <small class="text-muted">Firma Ceramica S.p.A.</small>
        </div>
        <div id="login-error" class="alert alert-danger py-2 d-none"></div>
        <div class="mb-3">
            <label class="form-label">Nazwa użytkownika</label>
            <input type="text" class="form-control" id="username" value="admin" autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Hasło</label>
            <input type="password" class="form-control" id="password" value="admin123">
        </div>
        <button class="btn btn-primary w-100" onclick="doLogin()">Zaloguj</button></div>
    </div>
</div>
<script>
async function doLogin() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const r = await fetch("/api/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });
    if (r.ok) { window.location.href = "/"; }
    else {
        const err = document.getElementById("login-error");
        err.textContent = "Nieprawidłowy login lub hasło";
        err.classList.remove("d-none");
    }
}
document.getElementById("password").addEventListener("keypress", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
